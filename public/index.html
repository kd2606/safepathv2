<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="SafePath — Your personal safety companion. Real-time danger alerts, SOS emergency broadcasting, and AI-powered safety guidance." />
  <meta name="theme-color" content="#0F0C29" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="SafePath" />

  <!-- Open Graph -->
  <meta property="og:title" content="SafePath — Personal Safety Companion" />
  <meta property="og:description" content="Real-time danger alerts, SOS broadcasting, and AI safety guidance." />
  <meta property="og:type" content="website" />

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

  <!-- Google Fonts — Inter for clean modern typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/src/styles/main.css" />
  <link rel="stylesheet" href="/src/styles/glass.css" />

  <title>SafePath — Personal Safety Companion</title>
</head>
<body>
  <!-- ========================================
       APP SHELL — Persistent layout wrapper
       ======================================== -->
  <div id="app">

    <!-- Page content is injected here by the router -->
    <main id="page-content" class="page-content" role="main" aria-live="polite">
      <!-- Skeleton loader shown while pages load -->
      <div id="skeleton-loader" class="skeleton-screen">
        <div class="skeleton-header">
          <div class="skeleton-bar skeleton-logo"></div>
          <div class="skeleton-circle skeleton-avatar"></div>
        </div>
        <div class="skeleton-card skeleton-card-lg"></div>
        <div class="skeleton-row">
          <div class="skeleton-card skeleton-card-sm"></div>
          <div class="skeleton-card skeleton-card-sm"></div>
          <div class="skeleton-card skeleton-card-sm"></div>
        </div>
        <div class="skeleton-card skeleton-card-md"></div>
        <div class="skeleton-card skeleton-card-md"></div>
      </div>
    </main>

    <!-- ========================================
         FLOATING SOS BUTTON — Always visible
         ======================================== -->
    <button id="sos-button" class="sos-button" aria-label="Emergency SOS">
      <span class="sos-pulse-ring"></span>
      <span class="sos-pulse-ring sos-pulse-ring--delayed"></span>
      <span class="sos-text">SOS</span>
    </button>

    <!-- ========================================
         BOTTOM NAVIGATION BAR
         ======================================== -->
    <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation">
      <a href="#home" class="nav-tab active" id="nav-home" data-page="home" aria-current="page">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
      </a>
      <a href="#map" class="nav-tab" id="nav-map" data-page="map">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Map</span>
      </a>
      <!-- Spacer for the floating SOS button -->
      <div class="nav-spacer" aria-hidden="true"></div>
      <a href="#chat" class="nav-tab" id="nav-chat" data-page="chat">
        <span class="nav-icon">🤖</span>
        <span class="nav-label">AI Chat</span>
      </a>
      <a href="#profile" class="nav-tab" id="nav-profile" data-page="profile">
        <span class="nav-icon">👤</span>
        <span class="nav-label">Profile</span>
      </a>
    </nav>
  </div>

  <!-- ========================================
       SCRIPTS — ES6 Modules
       ======================================== -->
  <script type="module" src="/src/app.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker
          .register('/sw.js')
          .then(reg => console.log('[SW] Registered:', reg.scope))
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }
  </script>
</body>
</html>
