<!-- SafePath App Icon — SVG for all sizes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F0C29"/>
      <stop offset="50%" stop-color="#302B63"/>
      <stop offset="100%" stop-color="#24243E"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  
  <!-- Shield -->
  <path d="M256 80 L380 140 C380 280 340 380 256 432 C172 380 132 280 132 140 Z" 
        fill="none" stroke="url(#shield)" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- Safe route checkmark -->
  <path d="M196 260 L236 300 L316 210" 
        fill="none" stroke="#00C853" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Route dots -->
  <circle cx="196" cy="200" r="6" fill="rgba(255,255,255,0.3)"/>
  <circle cx="316" cy="320" r="6" fill="rgba(255,255,255,0.3)"/>
</svg>
